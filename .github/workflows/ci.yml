name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        django: ["3.2", "4.2", "5.0", "5.1", "5.2", "6.0"]
        exclude:
          - python-version: "3.8"
            django: "5.0"
          - python-version: "3.8"
            django: "5.1"
          - python-version: "3.9"
            django: "5.0"
          - python-version: "3.9"
            django: "5.1"
          - python-version: "3.8"
            django: "5.2"
          - python-version: "3.9"
            django: "5.2"
          - python-version: "3.8"
            django: "6.0"
          - python-version: "3.9"
            django: "6.0"
          - python-version: "3.11"
            django: "3.2"
          - python-version: "3.12"
            django: "3.2"
          - python-version: "3.13"
            django: "3.2"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pip install Django==${{ matrix.django }}
      - run: pytest
